name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run shellcheck on bash scripts
        run: |
          set -e
          files=(
            link.sh
            linux/setup.sh
            linux/parse_tools.sh
            mac/setup.sh
            .claude/status-line.sh
          )
          for f in linux/installers/*.sh; do
            [ -e "$f" ] && files+=("$f")
          done
          shellcheck --severity=warning -e SC1091 "${files[@]}"

  syntax:
    name: shell syntax (bash/zsh/fish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install shells
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh fish
      - name: bash -n on shell scripts
        run: |
          set -e
          for f in link.sh linux/setup.sh linux/parse_tools.sh mac/setup.sh .claude/status-line.sh linux/installers/*.sh; do
            [ -e "$f" ] || continue
            echo "checking $f"
            bash -n "$f"
          done
      - name: zsh -n on zsh configs
        run: |
          set -e
          zsh -n .config/zsh/.zshrc
          zsh -n .config/zsh/.zshenv
          for f in .config/zsh/functions/*.zsh; do
            echo "checking $f"
            zsh -n "$f"
          done
      - name: fish -n on fish configs
        run: |
          set -e
          fish -n .config/fish/config.fish
          for f in .config/fish/functions/*.fish .config/fish/completions/*.fish .config/fish/conf.d/*.fish; do
            [ -e "$f" ] || continue
            echo "checking $f"
            fish -n "$f"
          done

  linux-install:
    name: linux package install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install apt packages from tools.toml
        run: |
          set -e
          sudo apt-get update -qq
          failed=""
          for pkg in $(bash linux/parse_tools.sh names linux/tools.toml apt); do
            echo "::group::Installing $pkg"
            if sudo apt-get install -y -qq "$pkg"; then
              echo "OK: $pkg"
            else
              echo "::error::FAILED: $pkg"
              failed="$failed $pkg"
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "::error::Failed packages:$failed"
            exit 1
          fi

  link:
    name: symlink
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run link.sh
        run: bash link.sh
        env:
          TERM: xterm-256color
      - name: Verify .config symlinks
        run: |
          set -e
          for f in .config/*; do
            name="$(basename "$f")"
            target="$HOME/.config/$name"
            if [ ! -L "$target" ]; then
              echo "::error::Not a symlink: $target"
              exit 1
            fi
            resolved="$(readlink "$target")"
            expected="$(pwd)/$f"
            if [ "$resolved" != "$expected" ]; then
              echo "::error::Wrong target: $target -> $resolved (expected $expected)"
              exit 1
            fi
            echo "OK: $target -> $resolved"
          done
      - name: Verify .claude symlink
        run: |
          set -e
          if [ -d .claude ]; then
            target="$HOME/.claude"
            if [ ! -L "$target" ]; then
              echo "::error::Not a symlink: $target"
              exit 1
            fi
            echo "OK: $target -> $(readlink "$target")"
          fi
      - name: Verify .zshenv symlink
        run: |
          set -e
          if [ -f .config/zsh/.zshenv ]; then
            target="$HOME/.zshenv"
            if [ ! -L "$target" ]; then
              echo "::error::Not a symlink: $target"
              exit 1
            fi
            echo "OK: $target -> $(readlink "$target")"
          fi

  aqua:
    name: aqua tools version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.43.1
          enable_aqua_install: "false"
      - name: Install aqua packages
        run: aqua -c .config/aquaproj-aqua/aqua.yaml install --all
        env:
          AQUA_DISABLE_GITHUB_ARTIFACT_ATTESTATION: "true"
          AQUA_DISABLE_COSIGN: "true"
          AQUA_DISABLE_SLSA: "true"
      - name: Verify tool versions
        env:
          AQUA_GLOBAL_CONFIG: ${{ github.workspace }}/.config/aquaproj-aqua/aqua.yaml
        run: |
          set -euo pipefail
          aqua_bin="${HOME}/.local/share/aquaproj-aqua/bin"
          failed=""
          skipped="aqua aqua-proxy"
          for cmd in "$aqua_bin"/*; do
            name="$(basename "$cmd")"
            case " $skipped " in *" $name "*) continue ;; esac
            echo -n "$name: "
            output=$("$cmd" --version 2>&1) && rc=$? || rc=$?
            if [ "$rc" -eq 127 ]; then
              echo "NOT FOUND"
              failed="$failed $name"
            elif [ "$rc" -eq 0 ]; then
              echo "$output" | head -1
            else
              echo "ok (--version exited $rc)"
            fi
          done
          if [ -n "$failed" ]; then
            echo "::error::Failed version checks:$failed"
            exit 1
          fi
          echo "All aqua tools verified successfully"

  macos-install:
    name: macOS brew check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate Brewfile syntax
        run: brew bundle check --file=mac/Brewfile 2>&1 || true
      - name: Dry-run Brewfile (list missing)
        run: |
          set -e
          brew bundle list --file=mac/Brewfile --all

  list-tools:
    name: list tools
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: set-matrix
        run: |
          tools=$(bash linux/parse_tools.sh json linux/tools.toml '!apt')
          echo "matrix={\"tool\":$tools}" >> "$GITHUB_OUTPUT"

  linux-tool:
    needs: list-tools
    name: tool (${{ matrix.tool }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.list-tools.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install & verify ${{ matrix.tool }}
        env:
          TOOL: ${{ matrix.tool }}
        run: |
          set -euo pipefail

          # read config from tools.toml
          eval "$(bash linux/parse_tools.sh get linux/tools.toml "$TOOL")"

          # prerequisites
          case "$type" in
            cargo)
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --quiet
              . "$HOME/.cargo/env"
              ;;
          esac
          export PATH="$HOME/.local/share/aquaproj-aqua/bin:$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$HOME/bin:$PATH"

          # install
          echo "::group::Installing $TOOL ($type)"
          case "$type" in
            curl)
              if [ -n "${flags:-}" ]; then
                # shellcheck disable=SC2086
                curl -fsSL "$url" | sh $flags
              else
                curl -fsSL "$url" | sh
              fi
              ;;
            cargo)
              cargo install "${crate:-$TOOL}" --locked
              ;;
            go)
              go install "$module"
              ;;
            script)
              bash "$path"
              ;;
          esac
          echo "::endgroup::"

          # verify
          export PATH="$HOME/.local/share/aquaproj-aqua/bin:$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$HOME/bin:$PATH"
          case "$TOOL" in
            rustup) command -v rustup && cargo --version ;;
            *)      command -v "$TOOL" ;;
          esac
          echo "OK: $TOOL installed successfully"
