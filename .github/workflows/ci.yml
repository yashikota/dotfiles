name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run shellcheck on bash scripts
        run: |
          set -e
          files=(
            link.sh
            linux/setup.sh
            mac/setup.sh
            .claude/status-line.sh
          )
          shellcheck --severity=warning -e SC1091 "${files[@]}"

  syntax:
    name: shell syntax (bash/zsh/fish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shells
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh fish
      - name: bash -n on shell scripts
        run: |
          set -e
          for f in link.sh linux/setup.sh mac/setup.sh .claude/status-line.sh; do
            echo "checking $f"
            bash -n "$f"
          done
      - name: zsh -n on zsh configs
        run: |
          set -e
          zsh -n .config/zsh/.zshrc
          zsh -n .config/zsh/.zshenv
          for f in .config/zsh/functions/*.zsh; do
            echo "checking $f"
            zsh -n "$f"
          done
      - name: fish -n on fish configs
        run: |
          set -e
          fish -n .config/fish/config.fish
          for f in .config/fish/functions/*.fish .config/fish/completions/*.fish .config/fish/conf.d/*.fish; do
            [ -e "$f" ] || continue
            echo "checking $f"
            fish -n "$f"
          done

  linux-install:
    name: linux package install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install apt packages from apps.txt
        run: |
          set -e
          sudo apt-get update -qq
          failed=""
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "::group::Installing $pkg"
            if sudo apt-get install -y -qq "$pkg"; then
              echo "OK: $pkg"
            else
              echo "::error::FAILED: $pkg"
              failed="$failed $pkg"
            fi
            echo "::endgroup::"
          done < linux/apps.txt
          if [ -n "$failed" ]; then
            echo "::error::Failed packages:$failed"
            exit 1
          fi

  link:
    name: symlink
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run link.sh
        run: bash link.sh
        env:
          TERM: xterm-256color
      - name: Verify .config symlinks
        run: |
          set -e
          for f in .config/*; do
            name="$(basename "$f")"
            target="$HOME/.config/$name"
            if [ ! -L "$target" ]; then
              echo "::error::Not a symlink: $target"
              exit 1
            fi
            resolved="$(readlink "$target")"
            expected="$(pwd)/$f"
            if [ "$resolved" != "$expected" ]; then
              echo "::error::Wrong target: $target -> $resolved (expected $expected)"
              exit 1
            fi
            echo "OK: $target -> $resolved"
          done
      - name: Verify .claude symlink
        run: |
          set -e
          if [ -d .claude ]; then
            target="$HOME/.claude"
            if [ ! -L "$target" ]; then
              echo "::error::Not a symlink: $target"
              exit 1
            fi
            echo "OK: $target -> $(readlink "$target")"
          fi
      - name: Verify .zshenv symlink
        run: |
          set -e
          if [ -f .config/zsh/.zshenv ]; then
            target="$HOME/.zshenv"
            if [ ! -L "$target" ]; then
              echo "::error::Not a symlink: $target"
              exit 1
            fi
            echo "OK: $target -> $(readlink "$target")"
          fi

  macos-install:
    name: macOS brew check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Brewfile syntax
        run: brew bundle check --file=mac/Brewfile 2>&1 || true
      - name: Dry-run Brewfile (list missing)
        run: |
          set -e
          brew bundle list --file=mac/Brewfile --all
