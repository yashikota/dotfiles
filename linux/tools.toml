# Centralized tool definitions for linux/setup.sh and CI.
# Section name = package/binary name.
# Types: apt, curl, cargo, go, script

# --- apt packages ---

[curl]
type = "apt"

[ca-certificates]
type = "apt"

[git]
type = "apt"

[zsh]
type = "apt"

[fish]
type = "apt"

[zip]
type = "apt"

[unzip]
type = "apt"

[neovim]
type = "apt"

[tmux]
type = "apt"

[build-essential]
type = "apt"

[pkg-config]
type = "apt"

[libssl-dev]
type = "apt"

[make]
type = "apt"

[cmake]
type = "apt"

[ffmpeg]
type = "apt"

[imagemagick]
type = "apt"

[xdg-utils]
type = "apt"

[locales]
type = "apt"

[libopencv-dev]
type = "apt"

[golang]
type = "apt"

[bat]
type = "apt"

[eza]
type = "apt"

[xsel]
type = "apt"

[duf]
type = "apt"

[fzf]
type = "apt"

[libsixel-bin]
type = "apt"

[fd-find]
type = "apt"

# --- curl installers ---

[starship]
type = "curl"
url = "https://starship.rs/install.sh"
flags = "-s -- -y"

[mise]
type = "curl"
url = "https://mise.run"

[tailscale]
type = "curl"
url = "https://tailscale.com/install.sh"

[zoxide]
type = "curl"
url = "https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh"

# --- script installers ---

[docker]
type = "script"
path = "linux/installers/docker.sh"

[rustup]
type = "script"
path = "linux/installers/rust.sh"

[gomi]
type = "script"
path = "linux/installers/gomi.sh"

# --- cargo ---

[btm]
type = "cargo"
crate = "bottom"

[delta]
type = "cargo"
crate = "git-delta"

[sheldon]
type = "cargo"

[shpool]
type = "cargo"

# --- go ---

[lazygit]
type = "go"
module = "github.com/jesseduffield/lazygit@latest"

[gibo]
type = "go"
module = "github.com/simonwhitaker/gibo@latest"
