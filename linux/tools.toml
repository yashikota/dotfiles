# Centralized tool definitions for linux/setup.sh and CI.
# Section name = package/binary name.
# Types: apt, curl, cargo, go, script

# --- apt packages ---

[curl]
type = "apt"

[ca-certificates]
type = "apt"

[git]
type = "apt"

[zsh]
type = "apt"

[zip]
type = "apt"

[unzip]
type = "apt"

[neovim]
type = "apt"

[build-essential]
type = "apt"

[pkg-config]
type = "apt"

[libssl-dev]
type = "apt"

[make]
type = "apt"

[imagemagick]
type = "apt"

[xdg-utils]
type = "apt"

[locales]
type = "apt"

[libopencv-dev]
type = "apt"

[xsel]
type = "apt"

[libsixel-bin]
type = "apt"

# --- curl installers ---

[tailscale]
type = "curl"
url = "https://tailscale.com/install.sh"

# --- script installers ---

[aqua]
type = "script"
path = "linux/installers/aqua.sh"

[docker]
type = "script"
path = "linux/installers/docker.sh"

# --- cargo ---

[shpool]
type = "cargo"
