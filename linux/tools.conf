# Centralized tool definitions for linux/setup.sh and CI.
# Format: type<TAB>binary<TAB>argument[<TAB>extra]
#
# Types
#   cargo   binary  crate (omit if same as binary)
#   go      binary  module@version
#   curl    binary  installer_url [extra: flags passed to sh]
#   script  binary  script_path (relative to repo root)

curl	starship	https://starship.rs/install.sh	-s -- -y
curl	mise	https://mise.run
curl	tailscale	https://tailscale.com/install.sh
curl	zoxide	https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh

script	docker	linux/installers/docker.sh
script	rustup	linux/installers/rust.sh
script	gomi	linux/installers/gomi.sh

cargo	btm	bottom
cargo	delta	git-delta
cargo	zellij
cargo	sheldon
cargo	shpool

go	lazygit	github.com/jesseduffield/lazygit@latest
go	gibo	github.com/simonwhitaker/gibo@latest
